<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Tetris Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Courier New', monospace;
    }

    body {
      background: radial-gradient(circle at center, #1f1f1f, #0b0b0b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    .game-container {
      display: flex;
      gap: 30px;
      align-items: center;
      background: rgba(20, 20, 20, 0.9);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0,255,255,0.3);
      border: 3px solid #00ffff;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    canvas {
      border: 4px solid #00ffff;
      background: #111;
      box-shadow: 0 0 20px rgba(0,255,255,0.4);
    }

    .info-box {
      background: #151515;
      padding: 15px;
      border-radius: 12px;
      border: 2px solid #ff00ff;
      box-shadow: 0 0 10px rgba(255,0,255,0.3);
      text-align: center;
    }

    .info-box h2 {
      margin-bottom: 10px;
      color: #00ffff;
      font-size: 18px;
    }

    .score {
      font-size: 24px;
      color: #fff;
    }

    .controls {
      line-height: 1.8;
      font-size: 14px;
      color: #ddd;
    }

    .title {
      position: absolute;
      top: 30px;
      font-size: 42px;
      letter-spacing: 4px;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 30px;
      border: 3px solid #ff0055;
      border-radius: 20px;
      text-align: center;
      display: none;
      z-index: 100;
    }

    .game-over h1 {
      color: #ff0055;
      margin-bottom: 15px;
    }

    .restart-btn {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: #00ffff;
      color: black;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .restart-btn:hover {
      background: #ff00ff;
      color: white;
    }
  </style>
</head>
<body>

  <div class="title">RETRO TETRIS</div>

  <div class="game-container">
    <canvas id="tetris" width="300" height="600"></canvas>

    <div class="left-panel">
      <div class="info-box">
        <h2>Score</h2>
        <div class="score" id="score">0</div>
      </div>

      <div class="info-box">
        <h2>Level</h2>
        <div class="score" id="level">1</div>
      </div>

      <div class="info-box controls">
        <h2>Controls</h2>
        ← Move Left<br>
        → Move Right<br>
        ↓ Soft Drop<br>
        ↑ Rotate<br>
        Space Fast Drop
      </div>
    </div>
  </div>

  <div class="game-over" id="gameOverBox">
    <h1>Game Over</h1>
    <p>Your Score: <span id="finalScore"></span></p>
    <button class="restart-btn" onclick="restartGame()">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    ctx.scale(30, 30);

    const scoreDisplay = document.getElementById('score');
    const levelDisplay = document.getElementById('level');

    const arena = createMatrix(10, 20);

    const colors = [
      null,
      '#00ffff',
      '#0000ff',
      '#ff7f00',
      '#ffff00',
      '#00ff00',
      '#800080',
      '#ff0000'
    ];

    const player = {
      pos: {x: 0, y: 0},
      matrix: null,
      score: 0,
      level: 1
    };

    function createMatrix(w, h) {
      const matrix = [];
      while (h--) {
        matrix.push(new Array(w).fill(0));
      }
      return matrix;
    }

    function createPiece(type) {
      if (type === 'T') {
        return [
          [0,6,0],
          [6,6,6],
          [0,0,0]
        ];
      } else if (type === 'O') {
        return [
          [4,4],
          [4,4]
        ];
      } else if (type === 'L') {
        return [
          [0,3,0],
          [0,3,0],
          [0,3,3]
        ];
      } else if (type === 'J') {
        return [
          [0,2,0],
          [0,2,0],
          [2,2,0]
        ];
      } else if (type === 'I') {
        return [
          [0,1,0,0],
          [0,1,0,0],
          [0,1,0,0],
          [0,1,0,0]
        ];
      } else if (type === 'S') {
        return [
          [0,5,5],
          [5,5,0],
          [0,0,0]
        ];
      } else if (type === 'Z') {
        return [
          [7,7,0],
          [0,7,7],
          [0,0,0]
        ];
      }
    }

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            ctx.fillStyle = colors[value];
            ctx.fillRect(x + offset.x, y + offset.y, 1, 1);

            ctx.strokeStyle = '#111';
            ctx.lineWidth = 0.05;
            ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
          }
        });
      });
    }

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawMatrix(arena, {x:0, y:0});
      drawMatrix(player.matrix, player.pos);
    }

    function merge(arena, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            arena[y + player.pos.y][x + player.pos.x] = value;
          }
        });
      });
    }

    function collide(arena, player) {
      const [m, o] = [player.matrix, player.pos];
      for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
          if (m[y][x] !== 0 &&
            (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
            return true;
          }
        }
      }
      return false;
    }

    function playerDrop() {
      player.pos.y++;
      if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
      }
      dropCounter = 0;
    }

    function playerMove(dir) {
      player.pos.x += dir;
      if (collide(arena, player)) {
        player.pos.x -= dir;
      }
    }

    function rotate(matrix) {
      for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
          [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
      }
      matrix.forEach(row => row.reverse());
    }

    function playerRotate() {
      const pos = player.pos.x;
      let offset = 1;
      rotate(player.matrix);

      while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));

        if (offset > player.matrix[0].length) {
          rotate(player.matrix);
          rotate(player.matrix);
          rotate(player.matrix);
          player.pos.x = pos;
          return;
        }
      }
    }

    function arenaSweep() {
      let rowCount = 1;

      outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
          if (arena[y][x] === 0) {
            continue outer;
          }
        }

        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;

        player.score += rowCount * 10;
        rowCount *= 2;

        updateScore();
      }
    }

    function playerReset() {
      const pieces = 'TJLOSZI';
      player.matrix = createPiece(pieces[Math.floor(Math.random() * pieces.length)]);
      player.pos.y = 0;
      player.pos.x = Math.floor(arena[0].length / 2) - Math.floor(player.matrix[0].length / 2);

      if (collide(arena, player)) {
        document.getElementById('gameOverBox').style.display = 'block';
        document.getElementById('finalScore').innerText = player.score;
        cancelAnimationFrame(animationId);
      }
    }

    function updateScore() {
      scoreDisplay.innerText = player.score;
      player.level = Math.floor(player.score / 100) + 1;
      levelDisplay.innerText = player.level;
      dropInterval = Math.max(150, 1000 - (player.level - 1) * 80);
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let animationId;

    function update(time = 0) {
      const deltaTime = time - lastTime;
      lastTime = time;

      dropCounter += deltaTime;
      if (dropCounter > dropInterval) {
        playerDrop();
      }

      draw();
      animationId = requestAnimationFrame(update);
    }

    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowLeft') {
        playerMove(-1);
      } else if (event.key === 'ArrowRight') {
        playerMove(1);
      } else if (event.key === 'ArrowDown') {
        playerDrop();
      } else if (event.key === 'ArrowUp') {
        playerRotate();
      } else if (event.code === 'Space') {
        while (!collide(arena, player)) {
          player.pos.y++;
        }
        player.pos.y--;
        playerDrop();
      }
    });

    function restartGame() {
      for (let y = 0; y < arena.length; y++) {
        arena[y].fill(0);
      }

      player.score = 0;
      player.level = 1;
      updateScore();

      document.getElementById('gameOverBox').style.display = 'none';

      playerReset();
      update();
    }

    playerReset();
    updateScore();
    update();
  </script>

</body>
</html>
